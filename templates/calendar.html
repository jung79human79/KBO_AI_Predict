<!DOCTYPE html>
<html>

<head>
    <!-- FullCalendar에서 제공하는 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js"></script>
    <!-- 내가 만든 CSS -->
    <!-- 브라우저는 나중에 불러온 CSS가 우선 적용되므로, 질문자님의 calendar.css에서 FullCalendar의 스타일을 원하는 대로 덮어쓸 수 있습니다. 이 방식이 가장 일반적인 사용법입니다. -->
    <style>
        body {
            margin: 0;
            padding: 30px;
            background: #f5f7fa;
            font-family: "맑은 고딕", sans-serif;
        }

        #calendar {
            width: 95%;
            margin: 30px auto;
        }

        .fc {
            color: white;
        }

        .fc-theme-standard td,
        .fc-theme-standard th {
            border: 1px solid #444a5d;
        }

        .fc-daygrid-day {
            background: #1f2430;
        }

        .fc-toolbar-title {
            color: #4CAF50;
            font-size: 32px;
            font-weight: bold;
        }

        .fc-button {
            background: #4CAF50 !important;
            border: none !important;
        }

        .fc-event {
            background: #2e7d32;
            border: none;
            font-size: 12px;
        }

        .fc-event {
            cursor: pointer;
            transition: all 0.2s;
        }

        .fc-event:hover {
            background-color: #2196F3 !important;
            transform: scale(1.03);
        }

        .btn-container {
            text-align: center;
            margin-top: 35px;
        }

        .btn-container a {
            display: inline-block;
            padding: 12px 30px;
            background-color: #4caf50;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
        }

        .btn-container a:hover {
            background-color: #45a049;
        }

        .nav-footer {
            text-align: center;
            margin-top: 35px;
        }

        .nav-footer a {
            font-size: 16px;
            color: #4caf50;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #4caf50;
            padding: 12px 30px;
            border-radius: 6px;
            transition: all 0.2s;
            display: inline-block;
        }

        .nav-footer a:hover {
            background-color: #4caf50;
            color: #fff;
        }

        .fc-daygrid-day-frame {
            position: relative;
        }

        .no-game {

            position: absolute;

            top: 52%;
            left: 50%;

            transform: translate(-50%, -50%);

            display: flex;
            flex-direction: column;
            align-items: center;

            opacity: 0.12;

            pointer-events: none;

            user-select: none;

            z-index: 0;

        }

        .no-game .ball {

            font-size: 48px;

            line-height: 1;

        }

        .no-game .text {

            margin-top: 6px;

            font-size: 15px;

            font-weight: bold;

            color: white;

            letter-spacing: 1px;

        }

        .fc-event {
            position: relative;
            z-index: 5;
        }
    </style>
</head>

<body>

    <div id="calendar"></div>

    <script>

        document.addEventListener('DOMContentLoaded', function () {

            var calendar = new FullCalendar.Calendar(
                document.getElementById('calendar'),
                {

                    initialView: 'dayGridMonth',

                    headerToolbar: {
                        // 이전 달 버튼
                        left: 'prev',
                        // 2026년 7월
                        center: 'title',
                        // 다음 달 버튼
                        right: 'next'
                    },
                    // 6주를 항상 표시하지 않고, 필요한 주만 표시합니다. 예를 들어 7월이 5주면 5주만 표시됩니다.
                    fixedWeekCount: false,
                    // 옵션을 넣으면 하루에 일정이 많을 때 자동으로 +2 more처럼 묶어 보여줍니다. 필요에 따라 켜거나 끌 수 있습니다.
                    dayMaxEvents: true,
                    // 이전 달과 다음 달의 날짜(회색으로 보이는 날짜)를 숨깁니다. 예를 들어 7월 캘린더라면 6월 말, 8월 초 날짜가 표시되지 않습니다.
                    showNonCurrentDates: false,

                    locale: 'ko',

                    height: 800,

                    events: '/events',

                    eventsSet: function (events) {

                        // 기존 "경기 없음" 모두 삭제
                        document.querySelectorAll(".no-game").forEach(function (e) {
                            e.remove();
                        });

                        // 현재 달의 모든 날짜 셀 검사
                        document.querySelectorAll(".fc-daygrid-day").forEach(function (day) {

                            const date = day.getAttribute("data-date");

                            if (!date) return;

                            // 해당 날짜 이벤트 존재 여부
                            const hasEvent = events.some(function (event) {

                                return event.startStr.substring(0, 10) === date;

                            });

                            // 이벤트가 없으면 표시
                            if (!hasEvent) {

                                const frame = day.querySelector(".fc-daygrid-day-frame");

                                if (!frame) return;

                                const div = document.createElement("div");

                                div.className = "no-game";

                                div.innerHTML = `
                                            <div class="ball">⚾</div>
                                            <div class="text">경기 없음</div>
                                            `;

                                frame.appendChild(div);

                            }

                        });

                    },


                    eventClick: function (info) {
                        // FullCalendar에서 기본적으로 제공하는 정보는 title, start, end 등입니다.
                        // 그 외에 사용자가 직접 추가한 데이터는 extendedProps 안에 저장됩니다.
                        let away = info.event.extendedProps.away_team;
                        let home = info.event.extendedProps.home_team;

                        window.location.href =
                            `/predict?away=${away}&home=${home}`;

                    },
                    eventDidMount: function (info) {
                        info.el.title = "클릭하여 승부예측 보기";
                    }

                });

            calendar.render();

        });

    </script>
    <!-- 
    <div class="btn-container">
        <a href="/predict_2">🔮 수동 예측 페이지로</a>
    </div>-->
    <div class="nav-footer">
        <a href="/predict_2">🔮 수동 예측 페이지로</a>
    </div>

</body>

</html>
