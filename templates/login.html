<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='calendar.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>로그인 - KBO AI 승부 예측</title>

</head>

<body>
    <div class="auth-container">
        <h2>로그인</h2>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <!--
                <div style="color: #ff6b6b; text-align: center; margin-bottom: 15px; font-size: 14px;">
                    {{ messages[0] }}
                </div> -->
        <script>
            Swal.fire({
                icon: 'error',
                title: '로그인 실패',
                text: '{{ messages[0] }}',
                confirmButtonText: '확인'
            });
        </script>
        {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" required placeholder="아이디 입력">
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required placeholder="비밀번호 입력">
            </div>
            <button type="submit" class="auth-btn">로그인</button>
        </form>
        <div class="switch-link">
            처음이신가요? <a href="/register">회원가입하기</a>
        </div>
    </div>
</body>

</html>
